# Configuración de Nginx para Discopro Django
# Ubicación típica: /etc/nginx/sites-available/discopro
# Crear symlink: ln -s /etc/nginx/sites-available/discopro /etc/nginx/sites-enabled/discopro

upstream discopro {
    server 127.0.0.1:8000;
}

# Redireccionar HTTP a HTTPS
server {
    listen 80;
    server_name discopro.example.com;
    
    return 301 https://$server_name$request_uri;
}

# Configuración HTTPS
server {
    listen 443 ssl http2;
    server_name discopro.example.com;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/discopro.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/discopro.example.com/privkey.pem;

    # Configuración SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Tamaño máximo de upload
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/discopro_access.log;
    error_log /var/log/nginx/discopro_error.log;

    # Archivos estáticos
    location /static/ {
        alias /home/discopro/Discopro_Django/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /home/discopro/Discopro_Django/media/;
        expires 7d;
    }

    # Proxy a Gunicorn
    location / {
        proxy_pass http://discopro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (opcional)
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
