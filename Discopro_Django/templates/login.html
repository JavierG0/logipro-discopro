{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - LogiPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <i class="fa-solid fa-pills"></i>
                <h1>LogiPro</h1>
                <p>Sistema de gestión de despachos</p>
            </div>

            {% if messages %}
            <div class="alerts">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'usuarios:login' %}" class="form-submit-loading">
                {% csrf_token %}
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Ej: operador_arica" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>
        </div>
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
