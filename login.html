<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discopro - Inicio de Sesión</title>
    <link rel="stylesheet" href="app_estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <i class="fa-solid fa-motorcycle"></i>
                <h1>Discopro</h1>
                <p>Sistema de Control de Movimientos</p>
            </div>
            <form action="dashboard.html">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required value="operador1">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required value="12345">
                </div>
                <div class="login-options">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Recordarme</label>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>
    </div>

</body>
</html>
